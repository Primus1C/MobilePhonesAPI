<h1>Документы с ошибками проведения</h1>
<p>Список документов с ошибками проведения.</p>
<p>Для того, чтобы открыть документ, следует щелкнуть мышью по строке с именем документа.</p>
<p>Список ошибок, которые были обнаружены во время проведения можно посмотреть, нажав символ "плюс" слева от документа.</p></body></html>
