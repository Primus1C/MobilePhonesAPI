<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN"><html><head><meta charset="UTF-8" http-equiv="content-type" content="text/html;charset=utf-8"></meta><meta http-equiv="X-UA-Compatible" content="IE=edge"></meta><style type="text/css">
                * {
                    box-sizing: border-box;
                    list-style-type: none;
                }     
                :root {}
                body {
                    color: var(--text-color);
                    background-color: var(--background-color);
                    margin-top: 2px;
                    margin-left: 2px;
                    margin-right: 2px;
                    font-family: Arial;
                    font-size: 12pt;
                }
                .container {     
                	padding-top: 10px;
                    padding-left: 20px;
                    padding-right: 20px;
                }
                .list {
                    display: flex;
                    flex-direction: column;
                    padding-left: 0px;
                }
                .list_item {
                    display: flex;
                    /*flex-direction: row;*/
                }
                .list_item_wrapper {
                    display: flex;
                    flex-direction: column;
                    padding-left: 16px;
                    padding-bottom: 16px;
                }
                .list_item_wrapper_person {
                    text-align: center;
                    line-height: 40px;
                    width: 100%;
                    max-height: 40px;
                    max-width: 40px;
                    font-size: large;
                    font-weight: 600;
                    background-color: var(--person-color);
                    border-radius: 50%;
                    display: inline-block;
                }
                .list_item_wrapper_msg {
                    display: flex;
                    flex-direction: column;
                    background-color: var(--message-background-color);
                    padding: 10px 16px;
                    border-radius: 16px;
                }
                .list_item_wrapper_msg_author {
                    color: var(--user-name-color);
                }
                .list_item_wrapper_msg_text {
                }
                .list_item_details {
                    display: flex;
                    align-items: center;
                    font-size: 12px;
                    color: var(--details-text-color);
                    margin-top: 5px;
                    padding-left: 0px;
                }
                .list_item_details_one {
                    display: flex;
                    align-items: center;
                    margin-right: 20px;
                    fill: var(--details-icon-color);
                }     
                .list_item_details_one_hilight{
                    display: flex;
                    align-items: center;
                    margin-right: 20px;
                    fill: var(--details-icon-color);
                } 
				.list_item_details_one_hilight:hover{
                    cursor: pointer;
					color: var(--details-hilight-color);
                    fill: var(--details-hilight-color);
				}
                .icon {
                    height: 16px;
                    width: 16px;
                    fill: inherit;
                    margin-right: 6px;
                } 
                .info {   
                	font-size: 10px; 
                	color: var(--info-color);
                	text-align: right;
                	margin: 6px;
                }
            </style></head><body>

<div class="container">
                
	
<ul class="list"><component_li></component_li></ul><div>
<p class="info">Обновлено: {{Обновлено}}</p> </div>

</div>  
   
 
<script>
const savedScrollTop = sessionStorage.getItem('scrollTop');
if (savedScrollTop) {
window.scrollTo(savedScrollTop,0);    
}
document.addEventListener('scroll', function(event) {
  sessionStorage.setItem('scrollTop', document.body.scrollTop);
})
 </script></body></html>
